name: Update language card

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile
        uses: actions/checkout@v4

      - name: Generate language card
        run: node scripts/generate-language-card.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Commit updated card
        run: |
          if git diff --quiet -- assets/languages.svg; then
            echo "Language card is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/languages.svg
          git commit -m "Update language breakdown card"
          git push
